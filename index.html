<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشروط - الشفا</title>

    <link href="https://fonts.googleapis.com/css2?family=Rubik&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Rubik', sans-serif;
            background: #eee;
            margin: 0;
        }

        main {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .part {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
        }

        .rtl { direction: rtl; text-align: right; }
        .ltr { direction: ltr; text-align: left; }

        button {
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<main>

<header>
    <h2>الشفا</h2>
    <button id="toggle">EN</button>
</header>

<div id="content"></div>

</main>

<script>
const params = new URLSearchParams(window.location.search);
const lang = params.get("lang") === "en" ? "en" : "ar";
const mode = params.get("mode");

const content = {
    ar: `
        <div class="part">
            <h1>شروط الاستخدام</h1>
            <p>تطبيق الشفا لا يجمع أي بيانات شخصية.</p>
        </div>
    `,
    en: `
        <div class="part">
            <h1>Terms of Use</h1>
            <p>The app does not collect personal data.</p>
        </div>
    `,

    delete_ar: `
        <div class="part">
            <h1>حذف الحساب</h1>
            <p>لحذف حسابك يرجى إرسال بريد إلى:</p>
            <p><b>codeb.jed@icloud.com</b></p>
        </div>
    `,
    delete_en: `
        <div class="part">
            <h1>Delete Account</h1>
            <p>To delete your account, send an email to:</p>
            <p><b>codeb.jed@icloud.com</b></p>
        </div>
    `
};

function render() {
    let key;

    if (mode === "delete") {
        key = "delete_" + lang;
    } else {
        key = lang;
    }

    document.getElementById("content").innerHTML = content[key];
    document.body.className = lang === "ar" ? "rtl" : "ltr";
}

document.getElementById("toggle").onclick = () => {
    const newLang = lang === "ar" ? "en" : "ar";
    window.location.search = `?lang=${newLang}${mode ? "&mode=" + mode : ""}`;
};

render();
</script>

</body>
</html>
